<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>ECE-EMS | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz8PTOfBUHVwRkV8_ruTHT6UT-XbrzKMfAyUcQ55VpmJ9YadqSSErkX80PmeNVz1PsN7g/exec';
</script>

<style>
/* ══════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════ */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --blue:       #1d6ff2;
  --blue-dk:    #1558d6;
  --blue-lt:    #e8f1ff;
  --blue-mid:   rgba(29,111,242,.12);
  --blue-glow:  rgba(29,111,242,.28);
  --blue-soft:  #dbeafe;
  --sky:        #38bdf8;
  --sky-lt:     rgba(56,189,248,.10);

  --white:      #ffffff;
  --snow:       #f7faff;
  --ice:        #edf4ff;
  --frost:      #e0ecff;
  --border:     rgba(29,111,242,.14);
  --border-md:  rgba(29,111,242,.26);

  --text:       #0c1a3a;
  --text2:      #1e3a6e;
  --muted:      #5a7aaa;
  --muted2:     #8aa8d0;

  --shadow-sm:  0 2px 8px rgba(29,111,242,.08), 0 1px 3px rgba(0,0,0,.04);
  --shadow:     0 8px 32px rgba(29,111,242,.13), 0 2px 8px rgba(0,0,0,.05);
  --shadow-lg:  0 20px 60px rgba(29,111,242,.18), 0 6px 20px rgba(0,0,0,.06);
  --shadow-btn: 0 4px 18px rgba(29,111,242,.38);

  --r:    12px;
  --r-lg: 20px;
  --r-xl: 26px;

  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--snow);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: max(20px, var(--sat)) 16px max(24px, var(--sab));
}

/* ══════════════════════════════════════
   BACKGROUND SCENE
══════════════════════════════════════ */
.scene {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: linear-gradient(160deg, #f0f7ff 0%, #ffffff 40%, #eaf3ff 80%, #f5f9ff 100%);
}

/* Animated grid */
.scene-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(29,111,242,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(29,111,242,.055) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  animation: gridPan 40s linear infinite;
}
@keyframes gridPan {
  from { background-position: 0 0; }
  to   { background-position: 48px 48px; }
}

/* Radial glows */
.glow {
  position: absolute; border-radius: 50%; pointer-events: none;
  filter: blur(60px);
}
.g1 {
  width: 600px; height: 600px;
  top: -200px; left: -150px;
  background: radial-gradient(circle, rgba(29,111,242,.12), transparent 70%);
  animation: floatA 18s ease-in-out infinite;
}
.g2 {
  width: 500px; height: 500px;
  bottom: -100px; right: -120px;
  background: radial-gradient(circle, rgba(56,189,248,.10), transparent 70%);
  animation: floatB 22s ease-in-out infinite;
}
.g3 {
  width: 350px; height: 350px;
  top: 40%; left: 55%;
  background: radial-gradient(circle, rgba(29,111,242,.07), transparent 70%);
  animation: floatC 28s ease-in-out infinite;
}
@keyframes floatA { 0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,-40px);} }
@keyframes floatB { 0%,100%{transform:translate(0,0);} 50%{transform:translate(-28px,32px);} }
@keyframes floatC { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-24px);} }

/* Floating particles */
.particles {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden;
}
.particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  opacity: 0;
  animation: rise linear infinite;
}
.particle:nth-child(1)  { left:8%;   width:4px;  height:4px;  animation-duration:12s; animation-delay:0s;    background:var(--blue); }
.particle:nth-child(2)  { left:18%;  width:6px;  height:6px;  animation-duration:15s; animation-delay:2s;    background:var(--sky); }
.particle:nth-child(3)  { left:30%;  width:3px;  height:3px;  animation-duration:10s; animation-delay:4s;    background:var(--blue); }
.particle:nth-child(4)  { left:45%;  width:5px;  height:5px;  animation-duration:18s; animation-delay:1s;    background:var(--blue-dk); }
.particle:nth-child(5)  { left:60%;  width:4px;  height:4px;  animation-duration:13s; animation-delay:3s;    background:var(--sky); }
.particle:nth-child(6)  { left:72%;  width:7px;  height:7px;  animation-duration:16s; animation-delay:0.5s;  background:var(--blue); }
.particle:nth-child(7)  { left:85%;  width:3px;  height:3px;  animation-duration:11s; animation-delay:5s;    background:var(--blue-dk); }
.particle:nth-child(8)  { left:92%;  width:5px;  height:5px;  animation-duration:14s; animation-delay:2.5s;  background:var(--sky); }
@keyframes rise {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: .5; }
  90%  { opacity: .3; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* Decorative arcs */
.arc {
  position: absolute; border-radius: 50%;
  border: 1.5px solid rgba(29,111,242,.09);
  pointer-events: none;
}
.arc1 { width:500px;height:500px; top:-250px;right:-250px; animation:spin1 60s linear infinite; }
.arc2 { width:320px;height:320px; top:-160px;right:-160px; border-color:rgba(56,189,248,.10); animation:spin1 40s linear infinite reverse; }
.arc3 { width:700px;height:700px; bottom:-350px;left:-350px; border-color:rgba(29,111,242,.06); animation:spin1 80s linear infinite; }
@keyframes spin1 { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════
   MAIN WRAPPER
══════════════════════════════════════ */
.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}

/* ══════════════════════════════════════
   BRAND / LOGO
══════════════════════════════════════ */
.brand {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  text-align: center;
  opacity: 0; transform: translateY(20px);
  animation: slideUp .6s cubic-bezier(.34,1.56,.64,1) .08s forwards;
}

.logo-ring {
  position: relative;
  width: 72px; height: 72px;
}
.logo-ring::before {
  content: '';
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  background: linear-gradient(135deg, var(--blue), var(--sky)) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out;
  mask-composite: exclude;
  animation: rotateBorder 6s linear infinite;
}
@keyframes rotateBorder {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.logo-inner {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: linear-gradient(145deg, var(--blue), var(--blue-dk));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 28px rgba(29,111,242,.4), inset 0 1px 0 rgba(255,255,255,.25);
  position: relative; z-index: 1;
}
.logo-text {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 800;
  color: #fff; letter-spacing: 1px;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px; font-weight: 800;
  color: var(--text); letter-spacing: -.4px;
}
.brand-name span { color: var(--blue); }
.brand-tagline {
  font-size: 12px; font-weight: 500;
  color: var(--muted); letter-spacing: .5px;
  display: flex; align-items: center; gap: 6px;
}
.tagline-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); opacity: .5; flex-shrink: 0;
}

/* ══════════════════════════════════════
   CARD
══════════════════════════════════════ */
.card {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--border-md);
  border-radius: var(--r-xl);
  padding: 38px 34px 30px;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(24px);
  animation: slideUp .65s cubic-bezier(.34,1.56,.64,1) .18s forwards;
}

/* Top shimmer bar */
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--blue), var(--sky), var(--blue-dk), var(--sky), var(--blue));
  background-size: 400%;
  animation: shimmerBar 5s linear infinite;
}
@keyframes shimmerBar {
  from { background-position: 0%; }
  to   { background-position: 400%; }
}

/* Decorative corner */
.card::after {
  content: '';
  position: absolute; bottom: -60px; right: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(29,111,242,.05), transparent 70%);
  pointer-events: none;
}

.card-head { margin-bottom: 28px; }
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 26px; font-weight: 800;
  color: var(--text); letter-spacing: -.5px;
  margin-bottom: 5px;
}
.card-sub {
  font-size: 13px; font-weight: 400;
  color: var(--muted); line-height: 1.5;
}

/* ══════════════════════════════════════
   ERROR BOX
══════════════════════════════════════ */
.err-box {
  display: none; align-items: center; gap: 10px;
  padding: 12px 14px; margin-bottom: 18px;
  background: #fff0f0;
  border: 1.5px solid rgba(220,38,38,.2);
  border-left: 3px solid #dc2626;
  border-radius: var(--r);
  font-size: 13px; font-weight: 500; color: #b91c1c;
  animation: shake .4s cubic-bezier(.36,.07,.19,.97);
}
.err-box.show { display: flex; }
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%,60%{transform:translateX(-5px);}
  40%,80%{transform:translateX(5px);}
}

/* ══════════════════════════════════════
   FORM FIELDS
══════════════════════════════════════ */
.f-group { margin-bottom: 18px; }

.f-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  letter-spacing: .7px; text-transform: uppercase;
  color: var(--text2); margin-bottom: 8px;
}
.f-label-icon { font-size: 13px; opacity: .7; }

.f-wrap { position: relative; }

.f-input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  background: var(--snow);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 400;
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.f-input::placeholder { color: var(--muted2); font-weight: 400; }
.f-input:focus {
  border-color: var(--blue);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(29,111,242,.09);
}
.f-input:focus + .f-ico-left,
.f-wrap:focus-within .f-ico-left { color: var(--blue); }

.f-ico-left {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--muted2); pointer-events: none;
  transition: color .2s; line-height: 0;
}

.pw-eye {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted2); padding: 5px;
  display: flex; align-items: center; justify-content: center;
  transition: color .18s; border-radius: 6px;
  min-width: 32px; min-height: 32px;
}
.pw-eye:hover { color: var(--blue); background: var(--blue-lt); }

/* Input with eye btn */
.has-eye { padding-right: 46px; }

/* floating label effect when filled */
.f-input:not(:placeholder-shown) {
  border-color: rgba(29,111,242,.3);
}

/* ══════════════════════════════════════
   SUBMIT BUTTON
══════════════════════════════════════ */
.btn-login {
  width: 100%;
  padding: 15px 20px;
  margin-top: 6px;
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dk) 100%);
  border: none; border-radius: var(--r);
  color: #fff;
  font-family: 'Outfit', sans-serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: var(--shadow-btn);
  transition: transform .2s, box-shadow .2s, opacity .2s;
  position: relative; overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 50%);
  pointer-events: none;
}
.btn-login::after {
  content: '';
  position: absolute; top: 50%; left: -100%;
  width: 60%; height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent);
  transform: translateY(-50%) skewX(-20deg);
  transition: left .5s ease;
}
.btn-login:hover::after { left: 150%; }
.btn-login:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(29,111,242,.48);
}
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: .65; cursor: not-allowed; transform: none !important; }

/* ══════════════════════════════════════
   DIVIDER
══════════════════════════════════════ */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 22px 0 18px;
}
.divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-md), transparent);
}
.divider-txt {
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: .5px; text-transform: uppercase;
  white-space: nowrap;
}

/* ══════════════════════════════════════
   QUICK LINKS
══════════════════════════════════════ */
.quick-links {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.quick-link {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 14px;
  background: var(--snow);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  text-decoration: none;
  color: var(--text2);
  font-size: 12px; font-weight: 600;
  transition: border-color .18s, background .18s, transform .18s, box-shadow .18s;
  white-space: nowrap;
}
.quick-link:hover {
  border-color: var(--blue);
  background: var(--blue-lt);
  color: var(--blue);
  transform: translateY(-1px);
  box-shadow: var(--shadow-sm);
}
.ql-icon { font-size: 15px; flex-shrink: 0; }

/* ══════════════════════════════════════
   CARD FOOTER
══════════════════════════════════════ */
.card-footer {
  margin-top: 24px; padding-top: 18px;
  border-top: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
}
.footer-txt {
  font-size: 11.5px; color: var(--muted);
  display: flex; align-items: center; gap: 6px;
}
.footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted2); }

/* ══════════════════════════════════════
   TRUST BADGES (below card)
══════════════════════════════════════ */
.trust-row {
  display: flex; align-items: center; justify-content: center; gap: 20px;
  opacity: 0; animation: fadeIn .6s ease .55s forwards;
}
.trust-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.trust-icon { font-size: 13px; opacity: .7; }
.trust-sep { width: 4px; height: 4px; border-radius: 50%; background: var(--border-md); }

/* ══════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════ */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ══════════════════════════════════════
   RIPPLE ON CLICK
══════════════════════════════════════ */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,.3);
  transform: scale(0);
  animation: rippleOut .5s linear;
  pointer-events: none;
}
@keyframes rippleOut {
  to { transform: scale(4); opacity: 0; }
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 480px) {
  body { padding: 16px 12px; }
  .logo-ring, .logo-inner { width: 62px; height: 62px; }
  .logo-text { font-size: 14px; }
  .brand-name { font-size: 20px; }
  .card { padding: 28px 20px 24px; border-radius: 20px; }
  .card-title { font-size: 22px; }
  .f-input { font-size: 14px; padding: 13px 14px 13px 42px; }
  .btn-login { font-size: 15px; padding: 14px; }
  .quick-links { grid-template-columns: 1fr 1fr; gap: 8px; }
  .quick-link { font-size: 11.5px; padding: 9px 10px; }
  .trust-row { gap: 12px; flex-wrap: wrap; justify-content: center; }
}
@media (max-width: 360px) {
  .card { padding: 22px 16px 20px; }
  .card-title { font-size: 20px; }
  .quick-links { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════
   FOCUS ACCESSIBILITY
══════════════════════════════════════ */
:focus-visible {
  outline: 2.5px solid var(--blue);
  outline-offset: 2px;
  border-radius: 6px;
}
</style>
</head>
<body>

<!-- ══ BACKGROUND ══ -->
<div class="scene">
  <div class="scene-grid"></div>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>
  <div class="arc arc1"></div>
  <div class="arc arc2"></div>
  <div class="arc arc3"></div>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
</div>

<!-- ══ CONTENT ══ -->
<div class="wrap">

  <!-- BRAND -->
  <div class="brand">
    <div class="logo-ring">
      <div class="logo-inner">
        <span class="logo-text">ECE</span>
      </div>
    </div>
    <div>
      <div class="brand-name">EMS <span>Portal</span></div>
      <div class="brand-tagline">
        <div class="tagline-dot"></div>
        Event Management System
        <div class="tagline-dot"></div>
      </div>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">

    <div class="card-head">
      <div class="card-title">Welcome back 👋</div>
      <div class="card-sub">Sign in with your ECE credentials to continue</div>
    </div>

    <!-- ERROR -->
    <div class="err-box" id="errBox">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8"  x2="12"    y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errTxt"></span>
    </div>

    <!-- EMAIL -->
    <div class="f-group">
      <label class="f-label" for="email">
        <span class="f-label-icon">✉</span>
        Email Address
      </label>
      <div class="f-wrap">
        <input class="f-input" type="email" id="email"
          placeholder="yourname@ece.edu"
          autocomplete="email" autofocus
          oninput="clearErr()"/>
        <span class="f-ico-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- PASSWORD -->
    <div class="f-group">
      <label class="f-label" for="password">
        <span class="f-label-icon">🔒</span>
        Password
      </label>
      <div class="f-wrap">
        <input class="f-input has-eye" type="password" id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          oninput="clearErr()"
          onkeydown="if(event.key==='Enter') doLogin()"/>
        <span class="f-ico-left">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <button class="pw-eye" type="button" onclick="togglePw()"
          tabindex="-1" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="btn-login" id="loginBtn" onclick="handleLogin(event)">
      <svg id="btnIcon" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span id="btnTxt">Sign In</span>
    </button>

  
    <!-- CARD FOOTER -->
    <div class="card-footer">
      <div class="footer-txt">
        <span>ECE Dept</span>
        <div class="footer-dot"></div>
        <span>KCET</span>
              </div>
    </div>

  </div><!-- /.card -->

  <!-- TRUST BADGES -->
  <div class="trust-row">
    <div class="trust-item">
      <span class="trust-icon">🔐</span> Secure Login
    </div>
    <div class="trust-sep"></div>
    <div class="trust-item">
      <span class="trust-icon">⚡</span> Live Data
    </div>
    <div class="trust-sep"></div>
    <div class="trust-item">
      <span class="trust-icon">📱</span> Mobile Ready
    </div>
  </div>

</div><!-- /.wrap -->

<script>
/* ══ ROLE → PAGE ══ */
const ROUTES = {
  Admin:       'admin.html',
  Student:     'student.html',
  Faculty:     'faculty.html',
  HOD:         'hod.html',
  Chairperson: 'chairperson.html'
};

/* ══ TOGGLE PASSWORD ══ */
function togglePw() {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  icon.innerHTML = show
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
               a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
               c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
}

/* ══ ERROR ══ */
let errTimer;
function showError(msg) {
  clearTimeout(errTimer);
  document.getElementById('errTxt').textContent = msg;
  const box = document.getElementById('errBox');
  box.classList.remove('show');
  void box.offsetWidth; // force reflow for re-animation
  box.classList.add('show');
  errTimer = setTimeout(() => box.classList.remove('show'), 6000);
}
function clearErr() {
  document.getElementById('errBox').classList.remove('show');
}

/* ══ LOADING STATE ══ */
function setLoading(on) {
  const btn  = document.getElementById('loginBtn');
  const icon = document.getElementById('btnIcon');
  const txt  = document.getElementById('btnTxt');
  btn.disabled = on;
  if (on) {
    icon.style.animation = 'spin .8s linear infinite';
    icon.innerHTML = `<circle cx="12" cy="12" r="9" stroke-width="2.5" stroke-dasharray="40" stroke-dashoffset="10"/>`;
    txt.textContent = 'Signing in…';
  } else {
    icon.style.animation = '';
    icon.innerHTML = `<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" y1="12" x2="3" y2="12"/>`;
    txt.textContent = 'Sign In';
  }
}

/* ══ RIPPLE EFFECT ══ */
function handleLogin(e) {
  const btn = document.getElementById('loginBtn');
  const r = document.createElement('span');
  const d = Math.max(btn.clientWidth, btn.clientHeight);
  const rect = btn.getBoundingClientRect();
  r.className = 'ripple';
  r.style.cssText = `width:${d}px;height:${d}px;left:${e.clientX-rect.left-d/2}px;top:${e.clientY-rect.top-d/2}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 500);
  doLogin();
}

/* ══ LOGIN ══ */
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email)    { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.');      return; }

  if (!GAS_URL || GAS_URL.includes('YOUR_GAS')) {
    showError('GAS URL not configured. Please update GAS_URL.');
    return;
  }

  setLoading(true);

  try {
    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({ action: 'login', email, password })
    });

    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();

    if (data.success) {
      localStorage.setItem('ems_user', JSON.stringify(data.user));
      // Animate card out
      document.querySelector('.card').style.transition = 'opacity .3s, transform .3s';
      document.querySelector('.card').style.opacity = '0';
      document.querySelector('.card').style.transform = 'translateY(-10px) scale(1.02)';
      setTimeout(() => {
        window.location.href = ROUTES[data.user.Role] || 'student.html';
      }, 300);
    } else {
      showError(data.message || 'Invalid credentials. Please try again.');
      setLoading(false);
    }
  } catch (err) {
    showError('Connection error. Check your network and try again.');
    setLoading(false);
  }
}

/* ══ PARTICLE RANDOM POSITIONS ══ */
document.querySelectorAll('.particle').forEach(p => {
  p.style.animationDelay = (Math.random() * 10) + 's';
  p.style.left = (Math.random() * 95) + '%';
  p.style.opacity = Math.random() * 0.4 + 0.1;
});
</script>
</body>
</html>
