<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ECE-EMS | Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet"/>

<script>
  // ★ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ★
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz8PTOfBUHVwRkV8_ruTHT6UT-XbrzKMfAyUcQ55VpmJ9YadqSSErkX80PmeNVz1PsN7g/exec';
  // Example:
  // const GAS_URL = 'https://script.google.com/macros/s/AKfycbyR1oGba7bAmwP37wVU48Z1KqEOWihHs8i144eP2a3Ry_20eVOg7vQLHwuKW8j60ywyew/exec';
</script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent:    #4f46e5;
  --accent2:   #6366f1;
  --accent-lt: #eef2ff;
  --teal:      #0891b2;
  --green:     #059669;
  --ink:       #17152b;
  --muted:     #78748e;
  --border:    rgba(99,91,199,0.15);
  --border2:   rgba(99,91,199,0.28);
  --bg:        #eeedf6;
  --white:     #ffffff;
  --field-bg:  #f5f4fb;
  --s3:        0 24px 64px rgba(20,18,40,0.13), 0 8px 24px rgba(20,18,40,0.07);
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: 24px 20px;
}

/* ── BACKGROUND ── */
.scene {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  background: linear-gradient(145deg, #ece8f8 0%, #eeedf6 50%, #e5eef8 100%);
}
.scene::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 900px 700px at 10% 20%, rgba(99,102,241,0.11) 0%, transparent 70%),
    radial-gradient(ellipse 700px 500px at 90% 85%, rgba(8,145,178,0.09)  0%, transparent 70%),
    radial-gradient(ellipse 500px 400px at 50% 50%, rgba(79,70,229,0.06)  0%, transparent 70%);
}
.dots {
  position: absolute; inset: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(79,70,229,0.13) 1px, transparent 1px);
  background-size: 36px 36px;
  animation: pan 80s linear infinite;
}
@keyframes pan { from { background-position: 0 0; } to { background-position: 72px 72px; } }

.blob { position: absolute; border-radius: 50%; pointer-events: none; }
.b1 { width:400px; height:400px; top:-100px; right:-80px;
  background: radial-gradient(circle, rgba(99,102,241,0.16), transparent 68%);
  animation: d1 20s ease-in-out infinite; }
.b2 { width:300px; height:300px; bottom:5%; left:-80px;
  background: radial-gradient(circle, rgba(8,145,178,0.13), transparent 68%);
  animation: d2 25s ease-in-out infinite; }
.b3 { width:220px; height:220px; top:40%; right:5%;
  background: radial-gradient(circle, rgba(5,150,105,0.10), transparent 68%);
  animation: d3 30s ease-in-out infinite; }
@keyframes d1 { 0%,100%{transform:translate(0,0);}  50%{transform:translate(28px,-36px);} }
@keyframes d2 { 0%,100%{transform:translate(0,0);}  50%{transform:translate(-22px,28px);} }
@keyframes d3 { 0%,100%{transform:translate(0,0);}  50%{transform:translate(18px,-22px);} }

/* ── WRAPPER ── */
.wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; gap: 28px;
  width: 100%; max-width: 400px;
}

/* ── BRAND ── */
.brand {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px; text-align: center;
  opacity: 0; transform: translateY(16px);
  animation: up 0.5s ease 0.05s forwards;
}
.brand-icon {
  width: 56px; height: 56px; border-radius: 15px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
  color: white; letter-spacing: 0.5px;
  box-shadow: 0 6px 20px rgba(79,70,229,0.32);
}
.brand-name {
  font-family: 'Sora', sans-serif; font-size: 19px;
  font-weight: 700; color: var(--ink);
}
.brand-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }

/* ── CARD ── */
.card {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--border2);
  border-radius: 22px;
  padding: 36px 32px 30px;
  box-shadow: var(--s3);
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(20px);
  animation: up 0.55s ease 0.14s forwards;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3.5px;
  background: linear-gradient(90deg, var(--accent), var(--teal), #7c3aed, var(--accent));
  background-size: 300%;
  animation: bar 5s linear infinite;
}
@keyframes bar { from { background-position: 0%;   } to { background-position: 300%; } }
@keyframes up   { to   { opacity: 1; transform: translateY(0); } }

.card-title {
  font-family: 'Sora', sans-serif; font-size: 22px;
  font-weight: 700; color: var(--ink); margin-bottom: 3px;
}
.card-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

/* ── FORM ── */
.f-group { margin-bottom: 16px; }
.f-label {
  display: block; font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 7px;
}
.f-input {
  width: 100%; padding: 13px 16px;
  background: var(--field-bg);
  border: 1.5px solid var(--border);
  border-radius: 11px; color: var(--ink);
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14.5px;
  outline: none; transition: all 0.18s;
  -webkit-appearance: none;
}
.f-input:focus {
  border-color: var(--accent);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.11);
}
.f-input::placeholder { color: #b0adc0; }

/* password eye toggle */
.pw-wrap { position: relative; }
.pw-eye {
  position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 4px;
  display: flex; align-items: center;
  transition: color 0.15s; line-height: 0;
}
.pw-eye:hover { color: var(--accent); }

/* ── ERROR BOX ── */
.err-box {
  display: none; align-items: center; gap: 9px;
  padding: 11px 14px; margin-bottom: 16px;
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 9px; font-size: 13px;
  color: #b91c1c; font-weight: 500;
}
.err-box.show { display: flex; }

/* ── SUBMIT BUTTON ── */
.btn-login {
  width: 100%; padding: 14px; margin-top: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px; color: white;
  font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.2px;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  box-shadow: 0 4px 14px rgba(79,70,229,0.32);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-login:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 26px rgba(79,70,229,0.4);
}
.btn-login:active   { transform: translateY(0); }
.btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

/* ── CARD FOOTER ── */
.card-footer {
  margin-top: 24px; padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.cf-txt  { font-size: 11.5px; color: var(--muted); }
.cf-links{ display: flex; gap: 18px; }
.cf-link {
  font-size: 11.5px; font-weight: 600;
  color: var(--muted); text-decoration: none; transition: color 0.15s;
}
.cf-link:hover { color: var(--accent); }

/* ── SPIN ── */
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  body { padding: 20px 16px; }
  .brand-icon { width: 50px; height: 50px; font-size: 13px; }
  .brand-name { font-size: 17px; }
  .card { padding: 28px 20px 24px; border-radius: 18px; }
  .card-title { font-size: 20px; }
  .f-input { font-size: 14px; padding: 12px 14px; }
  .btn-login { font-size: 14px; padding: 13px; }
  .card-footer { flex-direction: column; align-items: flex-start; }
}
@media (max-width: 360px) {
  .card { padding: 22px 16px 20px; }
  .card-title { font-size: 18px; }
}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="scene">
  <div class="dots"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div class="wrap">

  <!-- BRAND -->
  <div class="brand">
    <div class="brand-icon">ECE</div>
    <div class="brand-name">EMS Portal</div>
    <div class="brand-sub">Event Management System</div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-sub">Enter your credentials to access the portal</div>

    <!-- ERROR -->
    <div class="err-box" id="errBox">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8"  x2="12"    y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errTxt"></span>
    </div>

    <!-- EMAIL -->
    <div class="f-group">
      <label class="f-label" for="email">Email Address</label>
      <input class="f-input" type="email" id="email"
        placeholder="yourname@ece.edu"
        autocomplete="email" autofocus/>
    </div>

    <!-- PASSWORD -->
    <div class="f-group">
      <label class="f-label" for="password">Password</label>
      <div class="pw-wrap">
        <input class="f-input" type="password" id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          style="padding-right:44px"
          onkeydown="if(event.key==='Enter') doLogin()"/>
        <button class="pw-eye" type="button" onclick="togglePw()" tabindex="-1" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <svg id="btnIcon" width="17" height="17" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      <span id="btnTxt">Sign In</span>
    </button>

    <!-- FOOTER -->
    <div class="card-footer">
      <span class="cf-txt">ECE Dept — Engineering College</span>
      <div class="cf-links">
        <a href="leaderboard.html" class="cf-link">Leaderboard</a>
        <a href="report.html"      class="cf-link">Reports</a>
      </div>
    </div>
  </div>

</div>

<script>
// ── ROLE → PAGE MAP ──────────────────────────────────────────
const ROUTES = {
  Admin:       'admin.html',
  Student:     'student.html',
  Faculty:     'faculty.html',
  HOD:         'hod.html',
  Chairperson: 'chairperson.html'
};

// ── PASSWORD SHOW / HIDE ─────────────────────────────────────
function togglePw() {
  const inp  = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  icon.innerHTML = show
    ? /* eye-off */
      `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
               a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
               c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : /* eye */
      `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
}

// ── SHOW ERROR ───────────────────────────────────────────────
let errTimer;
function showError(msg) {
  clearTimeout(errTimer);
  document.getElementById('errTxt').textContent = msg;
  document.getElementById('errBox').classList.add('show');
  errTimer = setTimeout(() => {
    document.getElementById('errBox').classList.remove('show');
  }, 6000);
}

// ── BUTTON LOADING STATE ─────────────────────────────────────
function setLoading(on) {
  const btn  = document.getElementById('loginBtn');
  const icon = document.getElementById('btnIcon');
  const txt  = document.getElementById('btnTxt');
  btn.disabled = on;
  if (on) {
    icon.style.animation = 'spin 0.8s linear infinite';
    icon.innerHTML =
      `<circle cx="12" cy="12" r="10"/>
       <path d="M12 6v6l4 2"/>`;
    txt.textContent = 'Signing in…';
  } else {
    icon.style.animation = '';
    icon.innerHTML =
      `<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
       <polyline points="10 17 15 12 10 7"/>
       <line x1="15" y1="12" x2="3" y2="12"/>`;
    txt.textContent = 'Sign In';
  }
}

// ── LOGIN — fetches from GAS backend only ────────────────────
async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  // Client-side validation
  if (!email)    { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.');      return; }

  // GAS URL check
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
    showError('GAS URL not configured. Please update GAS_URL in this file.');
    return;
  }

  setLoading(true);

  try {
    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify({ action: 'login', email, password })
    });

    if (!res.ok) throw new Error('Server returned ' + res.status);

    const data = await res.json();

    if (data.success) {
      // Save full user object to session
      localStorage.setItem('ems_user', JSON.stringify(data.user));
      // Redirect based on Role from server — no client-side role selection
      window.location.href = ROUTES[data.user.Role] || 'student.html';
    } else {
      showError(data.message || 'Invalid credentials. Please try again.');
      setLoading(false);
    }

  } catch (err) {
    showError('Connection error. Please check your network and try again.');
    setLoading(false);
  }
}
</script>
</body>
</html>
